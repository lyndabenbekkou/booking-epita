---
name: pr-security
on:
  pull_request:

permissions:
  actions: read
  security-events: write
  contents: read

jobs:
  dependencies-analysis:
    name: Dependencies Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run OSV Scanner after PR
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5
        with:
          scan-args: |-
            --format sarif
            --output after.sarif
            ./
        continue-on-error: true

      - name: Checkout baseline commit
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}

      - name: Run OSV Scanner before PR
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5
        with:
          scan-args: |-
            --format sarif
            --output before.sarif
            ./
        continue-on-error: true

      - name: Compare analysis
        uses: google/osv-scanner-action/osv-reporter-action@c51854704019a247608d928f370c98740469d4b5
        with:
          scan-args: |-
            --new after.sarif
            --old before.sarif
            --output diff.sarif
        continue-on-error: true

      - name: Save differential report
        uses: actions/upload-artifact@v4
        with:
          name: dependencies-diff
          path: diff.sarif

  source-code-analysis:
    name: Source Code Analysis
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep@sha256:7810f1d7884974ab6dda7bef8f4a2c8e165ea2142fd8260515d380e4f1407263
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Semgrep differential
        run: |
          semgrep scan \
            --config .semgrep \
            --sarif \
            --baseline-commit ${{ github.event.pull_request.base.sha }} \
            --output semgrep-diff.sarif
        continue-on-error: true

      - name: Save differential report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-diff
          path: semgrep-diff.sarif
          